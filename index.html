<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>恋爱纪念日</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ivory: #fff8ed;
      --champagne: #f2d2bc;
      --blush: #d9a09a;
      --cocoa: #3d2420;
      --ink: #fffaf2;
      --soft-shadow: rgba(30, 14, 12, 0.56);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: "Noto Serif SC", serif;
      color: var(--ink);
      background: #171110;
      overflow-x: hidden;
    }

    .page {
      position: relative;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 30px 22px;
      isolation: isolate;
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: -3%;
      z-index: -3;
      background:
        linear-gradient(180deg, rgba(14, 12, 12, 0.18), rgba(18, 10, 9, 0.72)),
        url("https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=1900&q=86") center / cover no-repeat;
      filter: saturate(0.9) contrast(1.05) brightness(0.82);
      transform: scale(1.02);
      animation: slowZoom 18s ease-out forwards;
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 50% 38%, rgba(255, 226, 197, 0.2), transparent 34%),
        linear-gradient(90deg, rgba(14, 9, 9, 0.66), rgba(30, 17, 15, 0.24) 47%, rgba(13, 9, 9, 0.72)),
        linear-gradient(180deg, rgba(10, 8, 8, 0.4), rgba(20, 11, 10, 0.74) 68%, rgba(10, 8, 8, 0.86));
      pointer-events: none;
    }

    .film-grain {
      position: absolute;
      inset: 0;
      z-index: -1;
      opacity: 0.18;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.64), transparent 76%);
      pointer-events: none;
    }

    .hero {
      width: min(100%, 720px);
      text-align: center;
      padding: 58px 0 46px;
    }

    .eyebrow {
      margin: 0 0 18px;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(0.92rem, 3vw, 1.18rem);
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 248, 237, 0.72);
      animation: liftIn 900ms 120ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    h1 {
      max-width: 10.6em;
      margin: 0 auto;
      font-size: clamp(2.28rem, 10.7vw, 5.85rem);
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-wrap: balance;
      color: transparent;
      background: linear-gradient(92deg, #fffaf2 0%, #f1cfba 48%, #fff3dc 100%);
      background-clip: text;
      -webkit-background-clip: text;
      filter: drop-shadow(0 18px 34px var(--soft-shadow));
      animation: titleIn 1100ms 260ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .days {
      display: inline-block;
      margin: 0 0.04em;
      font-family: "Cormorant Garamond", "Noto Serif SC", serif;
      font-size: 1.13em;
      font-weight: 700;
      letter-spacing: 0.015em;
      color: #fff3dc;
      text-shadow:
        0 0 24px rgba(242, 210, 188, 0.34),
        0 16px 34px rgba(18, 8, 7, 0.48);
    }

    .copy {
      max-width: 580px;
      margin: 26px auto 0;
      font-size: clamp(0.98rem, 3.75vw, 1.12rem);
      line-height: 2;
      letter-spacing: 0.03em;
      color: rgba(255, 250, 242, 0.84);
      text-shadow: 0 12px 30px rgba(18, 8, 7, 0.46);
      animation: liftIn 1000ms 480ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-top: 38px;
      animation: liftIn 1000ms 650ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .memory-button {
      appearance: none;
      position: relative;
      border: 1px solid rgba(255, 248, 237, 0.42);
      border-radius: 999px;
      padding: 15px 30px 16px;
      min-width: 150px;
      color: var(--cocoa);
      font: 500 0.98rem/1 "Noto Serif SC", serif;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, rgba(255, 250, 242, 0.96), rgba(235, 200, 179, 0.92));
      box-shadow:
        0 18px 50px rgba(24, 10, 8, 0.34),
        0 0 34px rgba(242, 210, 188, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.76);
      cursor: pointer;
      transform: translateY(0);
      transition: transform 220ms ease, box-shadow 220ms ease, background 220ms ease;
      animation: buttonBreath 3.4s ease-in-out infinite;
    }

    .memory-button:hover,
    .memory-button:focus-visible {
      background: linear-gradient(135deg, #fffaf2, #edc8b2);
      box-shadow:
        0 24px 62px rgba(25, 10, 8, 0.42),
        0 0 42px rgba(242, 210, 188, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.86);
      transform: translateY(-3px);
      outline: none;
    }

    .memory-button:active {
      transform: translateY(-1px) scale(0.99);
    }

    .secret {
      min-height: 34px;
      margin: 24px auto 0;
      color: rgba(255, 248, 237, 0.82);
      font-size: 0.94rem;
      line-height: 1.7;
      letter-spacing: 0.03em;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 420ms ease, transform 420ms ease;
    }

    .secret.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes slowZoom {
      from {
        transform: scale(1.02);
      }

      to {
        transform: scale(1.11);
      }
    }

    @keyframes titleIn {
      from {
        opacity: 0;
        transform: translateY(24px);
        filter: blur(7px) drop-shadow(0 18px 34px var(--soft-shadow));
      }

      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0) drop-shadow(0 18px 34px var(--soft-shadow));
      }
    }

    @keyframes liftIn {
      from {
        opacity: 0;
        transform: translateY(18px);
        filter: blur(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    @keyframes buttonBreath {
      0%,
      100% {
        box-shadow:
          0 18px 50px rgba(24, 10, 8, 0.34),
          0 0 24px rgba(242, 210, 188, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.76);
      }

      50% {
        box-shadow:
          0 20px 56px rgba(24, 10, 8, 0.38),
          0 0 42px rgba(242, 210, 188, 0.26),
          inset 0 1px 0 rgba(255, 255, 255, 0.84);
      }
    }

    @media (min-width: 720px) {
      .page {
        padding: 56px;
      }

      .hero {
        padding-top: 72px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="film-grain" aria-hidden="true"></div>
    <section class="hero" aria-label="恋爱纪念首页">
      <p class="eyebrow">Our Anniversary</p>
      <h1>我们已经在一起 <span class="days" id="daysTogether">1,323</span> 天</h1>
      <p class="copy">
        把每一个平凡日子都悄悄收藏起来，等到今天，再把它们系成一束温柔的光，送给最特别的你。
      </p>
      <div class="actions">
        <button class="memory-button" type="button" id="memoryButton">查看回忆</button>
      </div>
      <p class="secret" id="secretNote" aria-live="polite">
        从遇见你的那天起，时间有了更柔软的名字。
      </p>
    </section>
  </main>

  <script>
    const loveStartDate = "2022-09-18";
    const daysTarget = document.querySelector("#daysTogether");
    const button = document.querySelector("#memoryButton");
    const secretNote = document.querySelector("#secretNote");

    function updateDaysTogether() {
      const start = new Date(`${loveStartDate}T00:00:00`);
      const today = new Date();
      const startDay = new Date(start.getFullYear(), start.getMonth(), start.getDate());
      const todayDay = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const diff = todayDay - startDay;
      const days = Math.max(1, Math.floor(diff / 86400000) + 1);

      daysTarget.textContent = days.toLocaleString("zh-CN");
    }

    button.addEventListener("click", () => {
      secretNote.classList.add("is-visible");
      button.textContent = "已为你打开";
    });

    updateDaysTogether();
  </script>
</body>
</html>
